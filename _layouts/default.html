<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
</head>

<body>

  {% include nav.html %}

  {% if page.url == "/" %}
  <!-- ========== HOME PAGE (2 columns) ========== -->
  <div style="width:180px; height:180px; overflow:hidden; border-radius:50%; margin:0 auto 15px auto;">
    <!-- This adds 15px space below the avatar. -->
    <!-- Sidebar -->
    <aside style="flex:1; max-width:300px; text-align:center;">
      {% if site.logo %}
        <!-- <img src="{{ site.logo | relative_url }}" alt="Logo" style="width:100%; border-radius:50%;"> -->
          <div style="width:180px; height:180px; overflow:hidden; border-radius:50%; margin:auto;">
      <img src="{{ site.logo | relative_url }}" 
     alt="Avatar" 
     style="width:100%; height:100%; object-fit:cover; object-position:center 20%;">

        </div>
      {% endif %}
      <h2>{{ site.title }}</h2>
      <p>{{ site.description }}</p>
    </aside>

    <!-- Main content -->
    <main style="flex:3;">
      {{ content }}
    </main>

  </div>

  {% else %}
  <!-- ========== OTHER PAGES (single column) ========== -->
  <main style="max-width:900px; margin:0 auto; padding:20px;">
    {{ content }}
  </main>
  {% endif %}

</body>
</html>
