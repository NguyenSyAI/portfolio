<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
</head>

<body>

  {% include nav.html %}

  <div style="display:flex; max-width:1200px; margin:0 auto; gap:40px; padding:20px;">
    
    <!-- Sidebar -->
    <aside style="flex:1; max-width:300px;">
      {% if site.logo %}
        <img src="{{ site.logo | relative_url }}" alt="Logo" style="width:100%; border-radius:50%;">
      {% endif %}
      <h2>{{ site.title }}</h2>
      <p>{{ site.description }}</p>
    </aside>

    <!-- Main content -->
    <main style="flex:3;">
      {{ content }}
    </main>

  </div>

</body>
</html>
